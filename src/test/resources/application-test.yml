cors:
  allowed-origins: http://localhost:5173

spring:
  datasource:
    # Testcontainers auto-configures via @ServiceConnection
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  h2:
    console:
      enabled: false

