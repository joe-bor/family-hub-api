spring:
  application:
    name: family-hub-api

  profiles:
    active: dev

  jpa:
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false

  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  issuer: family-hub-api