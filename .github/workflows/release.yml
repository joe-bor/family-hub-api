name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tag-release-image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for CI image to be available
        run: |
          # SHA tag format must match ci.yml's docker/metadata-action (type=sha,prefix=)
          SHA=$(echo "${{ needs.release-please.outputs.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/joe-bor/family-hub-api:${SHA}"
          for i in $(seq 1 30); do
            if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
              echo "Image $IMAGE found"
              exit 0
            fi
            echo "Waiting for $IMAGE (attempt $i/30)..."
            sleep 10
          done
          echo "::error::Image $IMAGE not found after 5 minutes"
          exit 1

      - name: Retag image with semver
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION=${VERSION#v}
          # SHA tag format must match ci.yml's docker/metadata-action (type=sha,prefix=)
          SHA=$(echo "${{ needs.release-please.outputs.sha }}" | cut -c1-7)
          echo "Retagging ghcr.io/joe-bor/family-hub-api:${SHA} as ${VERSION}"
          docker buildx imagetools create \
            ghcr.io/joe-bor/family-hub-api:${SHA} \
            --tag ghcr.io/joe-bor/family-hub-api:${VERSION}
